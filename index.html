<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4 Cube Crafting Hub</title>
    <style>
        :root {
            --bg-dark: #08080a;
            --panel-bg: #101115;
            --panel-border: #23252b;
            --text-main: #c4c8d4;
            --text-gold: #f3ca40;
            --text-purple: #a370f7;
            --slot-active: #f3ca40;
            --badge-border: #3e424e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 25px auto;
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 15px;
        }

        .header-title h1 {
            color: var(--text-gold);
            margin: 0 0 4px 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-title p {
            margin: 0;
            color: #717784;
            font-size: 0.9rem;
        }

        /* Class Selector Styling */
        .class-selector-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #16181f;
            padding: 10px 20px;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
        }

        .class-selector-wrapper label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #8a8f9d;
            text-transform: uppercase;
        }

        .class-select {
            background: #20222a;
            color: var(--text-gold);
            border: 1px solid #3a3d4a;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        /* Main Split Layout Grid */
        .main-layout {
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Dual Column RPG Equipment Layout */
        .equipment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-content: start;
        }

        /* Individual Gear Item Blocks matching image layout */
        .item-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 16px;
            position: relative;
            transition: border-color 0.2s ease;
        }

        .item-card:hover {
            border-color: #3e424e;
        }

        .item-card.active {
            border-color: var(--slot-active);
            box-shadow: inset 0 0 12px rgba(243, 202, 64, 0.08);
        }

        .item-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #717784;
            margin-bottom: 2px;
        }

        .item-name-placeholder {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--text-purple);
            margin-bottom: 15px;
            border-bottom: 1px solid #1c1e24;
            padding-bottom: 6px;
        }

        /* Dropdown Affix Rows inside cards */
        .card-affix-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-row {
            display: grid;
            grid-template-columns: 24px 1fr;
            align-items: center;
        }

        .row-num {
            font-size: 0.85rem;
            color: #515664;
            font-weight: bold;
        }

        .card-select {
            background: #15161c;
            color: var(--text-main);
            border: 1px solid #23252b;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            outline: none;
            width: 100%;
            cursor: pointer;
        }

        .card-select:focus {
            border-color: #4a4f5d;
            color: #fff;
        }

        .card-select.has-value {
            color: #4da6ff; /* Colors active selected choices */
        }

        /* Right Side Live Calculation Readout Panel */
        .sidebar-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 25px;
            position: sticky;
            top: 20px;
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
        }

        .sidebar-panel h2 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-gold);
            letter-spacing: 1px;
        }

        .active-target-title {
            font-size: 0.9rem;
            color: var(--text-purple);
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 10px;
        }

        .results-scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .result-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1c1e24;
        }

        .result-item-row:last-child {
            border-bottom: none;
        }

        .affix-label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Material Badges styled neatly */
        .badge {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid var(--badge-border);
        }
        .badge-aggressive { background: #3a1414; color: #ff9e9e; border-color: #7a2424; }
        .badge-protector { background: #112633; color: #9ed7ff; border-color: #1f4b66; }
        .badge-pragmatic { background: #221830; color: #e2bfff; border-color: #4a2d70; }
        .badge-resourceful { background: #132b15; color: #aeffb4; border-color: #205424; }
        .badge-adept { background: #332612; color: #ffe69e; border-color: #664d1f; }
        .badge-none { background: #1c1d22; color: #717784; border-color: #2d3038; }

        .empty-sidebar-notice {
            color: #515664;
            font-style: italic;
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Horadric Cube Prism Planner</h1>
            <p>Select an item card to calculate exact Tuning Prism combinations</p>
        </div>
        
        <!-- Class Selector Engine Input -->
        <div class="class-selector-wrapper">
            <label for="class-select-dropdown">Active Class:</label>
            <select id="class-select-dropdown" class="class-select" onchange="handleClassChange(this.value)">
                <option value="spiritborn">Spiritborn</option>
                <option value="barbarian">Barbarian</option>
                <option value="druid">Druid</option>
                <option value="necromancer">Necromancer</option>
                <option value="rogue">Rogue</option>
                <option value="sorcerer">Sorcerer</option>
            </select>
        </div>
    </header>

    <main class="main-layout">
        <!-- Equipment Layout Matrix Grid -->
        <section class="equipment-grid" id="equipment-matrix">
            
            <!-- Left Column Content Blocks -->
            <div class="left-equipment-column" style="display: flex; flex-direction: column; gap: 20px;">
                <!-- Helm -->
                <div class="item-card" id="card-helm" onclick="focusItemCard('helm')">
                    <div class="item-header">Helm</div>
                    <div class="item-name-placeholder">Custom Helm Configuration</div>
                    <div class="card-affix-list" id="fields-helm"></div>
                </div>

                <!-- Chest -->
                <div class="item-card" id="card-chest" onclick="focusItemCard('chest')">
                    <div class="item-header">Chest Armor</div>
                    <div class="item-name-placeholder">Custom Chest Configuration</div>
                    <div class="card-affix-list" id="fields-chest"></div>
                </div>

                <!-- Arms (Gloves) -->
                <div class="item-card" id="card-gloves" onclick="focusItemCard('gloves')">
                    <div class="item-header">Gloves</div>
                    <div class="item-name-placeholder">Custom Gloves Configuration</div>
                    <div class="card-affix-list" id="fields-gloves"></div>
                </div>

                <!-- Legs (Pants) -->
                <div class="item-card" id="card-pants" onclick="focusItemCard('pants')">
                    <div class="item-header">Pants</div>
                    <div class="item-name-placeholder">Custom Pants Configuration</div>
                    <div class="card-affix-list" id="fields-pants"></div>
                </div>

                <!-- Boots -->
                <div class="item-card" id="card-boots" onclick="focusItemCard('boots')">
                    <div class="item-header">Boots</div>
                    <div class="item-name-placeholder">Custom Boots Configuration</div>
                    <div class="card-affix-list" id="fields-boots"></div>
